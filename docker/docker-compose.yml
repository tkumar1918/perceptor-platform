# ============================================================================
# Perceptor Platform — multi-tenant observability on Docker Compose.
#
# Only the EDGE is exposed to the host:
#   - Caddy    :4318  (authenticated OTLP/HTTP ingest)
#   - Grafana  :3001  (UI)
# Backends (SeaweedFS/Mimir/Loki/Tempo/Collector) are reachable ONLY on the
# internal network. There is no unauthenticated path to write or read telemetry.
# ============================================================================

name: perceptor-platform

# Single S3-generic env block shared by every service that touches storage.
# Switching from SeaweedFS to AWS S3 / R2 / B2 = change these values in .env only.
#
# The :?err guards are load-bearing: compose interpolates ${VARS} from the
# --env-file at PARSE time, and a bare `docker compose up` (no --env-file, or
# run from the wrong directory) silently resolves them all to empty — which
# recreates mimir/loki/tempo with no storage config and crash-loops the whole
# backend (this exact mistake caused a real outage). With :? the wrong
# invocation dies loudly before touching any container.
#
# The CREDENTIAL pair deliberately has NO guard and defaults to empty: on AWS,
# empty creds fall through to the SDK default chain (EC2 instance role) — the
# preferred auth. See Profile C in .env.example.
x-s3-env: &s3-env
  S3_ENDPOINT: ${S3_ENDPOINT:?S3_* not loaded — run via `make` (it passes --env-file .env from the repo root)}
  S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:?S3_* not loaded — run via `make`}
  S3_REGION: ${S3_REGION:?S3_* not loaded — run via `make`}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
  S3_INSECURE: ${S3_INSECURE:-false}
  S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-false}
  S3_BUCKET_LOOKUP: ${S3_BUCKET_LOOKUP:-auto}
  BUCKET_MIMIR: ${BUCKET_MIMIR:?S3_* not loaded — run via `make`}
  BUCKET_LOKI: ${BUCKET_LOKI:?S3_* not loaded — run via `make`}
  BUCKET_TEMPO: ${BUCKET_TEMPO:?S3_* not loaded — run via `make`}

# Bounded container-log rotation. Without this, the json-file driver grows the
# per-container logs under /var/lib/docker forever and can fill the instance
# disk. 3 files x 100MB = 300MB hard cap per container.
x-logging: &logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "3"

# Opt-in marker for the central Alloy agent. Log collection is opt-in (a
# container's stdout is scraped only if it carries perceptor.enable=true), so the
# platform's OWN stack services wear this to land their logs in the _infra tenant.
# A new stack service without it is NOT self-monitored — add `labels:
# *perceptor-monitored` when you add one. (The `alloy` agent itself is omitted on
# purpose: it must not tail its own stderr — that's the feedback-loop guard.)
x-perceptor-labels: &perceptor-monitored
  perceptor.enable: "true"

networks:
  obs:
    driver: bridge

volumes:
  seaweedfs-data:
  mimir-data:
  loki-data:
  tempo-data:
  grafana-data:
  caddy-data:
  otel-queue:
  alloy-data:

services:

  # ---------------------------------------------------------------------------
  # Edge gateway: authenticates the project token, stamps X-Scope-OrgID.
  # This is the ONLY ingest entrypoint. Rendered from tenants.yaml.
  # ---------------------------------------------------------------------------
  caddy:
    image: caddy:2.10
    container_name: perceptor-caddy
    labels: *perceptor-monitored
    logging: *logging
    restart: unless-stopped
    mem_limit: 256m
    # service_started, NOT service_healthy — deliberately. The old chain
    # (caddy -> collector healthy -> tempo healthy) meant one sick backend at
    # boot kept Caddy DOWN, killing ingest for every signal of every tenant.
    # A Caddy that 502s while the collector warms up is strictly better than
    # no edge at all: exporters retry, and the collector's queue absorbs.
    depends_on:
      otel-collector:
        condition: service_started
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
    # Two interface knobs decide what this host exposes (see .env):
    #   EDGE_BIND     — the PUBLIC TLS edge (80 + 443). Defaults to localhost so a
    #                   fresh clone exposes nothing surprising and never fights a
    #                   host nginx; the TLS box sets 0.0.0.0 to face the internet.
    #   SERVICE_BIND  — the plain OTLP/HTTP port here + Grafana's UI port. Defaults
    #                   to all interfaces for easy local dev; the TLS box sets
    #                   127.0.0.1 so they stay on-box (debug only) — with a TLS
    #                   edge, 80 + 443 are then the ONLY public ports.
    ports:
      - "${EDGE_BIND:-127.0.0.1}:80:80"       # HTTP: ACME challenge + redirect to HTTPS
      - "${EDGE_BIND:-127.0.0.1}:443:443"     # HTTPS edge: OTLP/HTTP, OTLP/gRPC (rides 443, h2c to collector), Grafana vhost
      - "${SERVICE_BIND:-0.0.0.0}:4318:4318"  # plain OTLP/HTTP — the edge in dev / behind an existing TLS front
    networks: [obs]

  # ---------------------------------------------------------------------------
  # Gateway pipeline.
  # ---------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.143.1
    container_name: perceptor-otel-collector
    labels: *perceptor-monitored
    logging: *logging
    restart: unless-stopped
    # Pairs with memory_limiter's explicit limit_mib in collector-config.yaml:
    # the limiter drops data at ~600MiB, this cgroup cap is the hard backstop.
    # Without a container limit, limit_percentage read HOST memory — letting the
    # collector balloon toward 80% of the box before "protecting" anything.
    mem_limit: 768m
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel/collector-config.yaml:/etc/otel-collector-config.yaml:ro
      - otel-queue:/var/lib/otelcol/queue
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "components"]   # process-up smoke check ONLY — a subcommand, exits 0 even if the serving pipeline is wedged (image is distroless; :13133 can't be probed). Nothing gates on it anymore.
      interval: 10s
      timeout: 5s
      retries: 5
    # All service_started: the per-exporter retry + persistent queue exist
    # precisely so a slow/sick backend doesn't block the pipeline — gating the
    # collector's own startup on tempo's health defeated that (a tempo that
    # couldn't go ready kept the collector, and with it Caddy, from starting:
    # total ingest outage caused by the least-critical backend).
    depends_on:
      init-perms: { condition: service_completed_successfully }
      mimir: { condition: service_started }
      loki:  { condition: service_started }
      tempo: { condition: service_started }
    networks: [obs]

  # ===========================================================================
  # STORAGE = EXTERNAL AWS S3 (see S3_* in .env). The two services below —
  # `seaweedfs` (local object store) and `s3-init` (bucket creator) — are
  # DISABLED for the AWS path: the buckets are pre-created in AWS, and the
  # scoped IAM policy intentionally lacks ListAllMyBuckets / CreateBucket that
  # s3-init requires (it would hang forever and block mimir/loki/tempo).
  #
  # To run FULLY LOCAL again (SeaweedFS, no AWS):
  #   1. Uncomment both services below.
  #   2. Revert the S3_* block in .env to the SeaweedFS values
  #      (endpoint seaweedfs:8333, INSECURE=true, FORCE_PATH_STYLE=true, LOOKUP=path).
  #   3. Re-add `s3-init: { condition: service_completed_successfully }` to the
  #      depends_on of mimir, loki, and tempo.
  # ===========================================================================
  # ---------------------------------------------------------------------------
  # Object storage — SeaweedFS (Apache-2.0, S3-compatible, durable backend for
  # all three signals). Generates its S3 credential file from env at startup so
  # no secret is baked into the image/config. Replaceable by AWS S3 via .env.
  # ---------------------------------------------------------------------------
  # seaweedfs:
  #   image: chrislusf/seaweedfs:4.32
  #   container_name: perceptor-seaweedfs
  #   restart: unless-stopped
  #   environment: *s3-env
  #   entrypoint:
  #     - /bin/sh
  #     - -ec
  #     - |
  #       mkdir -p /etc/seaweedfs
  #       cat > /etc/seaweedfs/s3.json <<EOF
  #       {"identities":[{"name":"perceptor","credentials":[{"accessKey":"$${S3_ACCESS_KEY_ID}","secretKey":"$${S3_SECRET_ACCESS_KEY}"}],"actions":["Admin","Read","Write","List","Tagging"]}]}
  #       EOF
  #       exec weed server -dir=/data -s3 -s3.config=/etc/seaweedfs/s3.json
  #   volumes:
  #     - seaweedfs-data:/data
  #   networks: [obs]

  # Ensures the per-signal buckets exist, then exits. Uses the generic S3 API
  # (aws-cli), so this same step works unchanged against AWS S3 / R2 / B2.
  # s3-init:
  #   image: amazon/aws-cli:2.31.18
  #   container_name: perceptor-s3-init
  #   depends_on:
  #     seaweedfs: { condition: service_started }
  #   environment:
  #     AWS_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
  #     AWS_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
  #     AWS_DEFAULT_REGION: ${S3_REGION}
  #     S3_ENDPOINT_URL: ${S3_ENDPOINT_URL}
  #     BUCKET_MIMIR: ${BUCKET_MIMIR}
  #     BUCKET_LOKI: ${BUCKET_LOKI}
  #     BUCKET_TEMPO: ${BUCKET_TEMPO}
  #   entrypoint:
  #     - /bin/sh
  #     - -ec
  #     - |
  #       until aws --endpoint-url "$$S3_ENDPOINT_URL" s3 ls >/dev/null 2>&1; do
  #         echo "waiting for s3 at $$S3_ENDPOINT_URL"; sleep 2; done
  #       for b in "$$BUCKET_MIMIR" "$$BUCKET_LOKI" "$$BUCKET_TEMPO"; do
  #         aws --endpoint-url "$$S3_ENDPOINT_URL" s3 mb "s3://$$b" 2>/dev/null || true
  #         echo "ensured bucket $$b"
  #       done
  #   networks: [obs]

  # Makes the data volumes writable by the non-root uid the Grafana images run
  # as (10001), so we never have to run Loki/Tempo as root. Mimir runs as root
  # and Grafana (472) inherits its perms from the image, so they don't need it.
  init-perms:
    image: busybox:1.37
    container_name: perceptor-init-perms
    logging: *logging
    # Only recurse on first boot (or a wrong owner): `chown -R` over millions of
    # accumulated WAL/index files would otherwise stall every startup, and loki +
    # the collector gate on this completing.
    command: sh -ec 'for d in /loki /tempo /otelq; do [ "$$(stat -c %u $$d)" = "10001" ] || chown -R 10001:10001 "$$d"; done'
    volumes:
      - loki-data:/loki
      - tempo-data:/tempo
      - otel-queue:/otelq
    networks: [obs]

  # ---------------------------------------------------------------------------
  # Metrics — Mimir (multitenant, S3).
  # ---------------------------------------------------------------------------
  mimir:
    image: grafana/mimir:3.0.2
    container_name: perceptor-mimir
    labels: *perceptor-monitored
    logging: *logging
    restart: unless-stopped
    mem_limit: 2g
    command: ["-config.file=/etc/mimir/mimir.yaml", "-config.expand-env=true"]
    environment: *s3-env
    volumes:
      - ./mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - ./mimir/overrides.yaml:/etc/mimir/overrides.yaml:ro
      - mimir-data:/data/mimir
    # No healthcheck: the Mimir image is distroless (no shell/wget to probe with).
    # Dependents gate on service_started; the collector's retry+queue covers the
    # brief warmup window.
    # (storage is external AWS S3 — no s3-init dependency; buckets pre-exist)
    networks: [obs]

  # ---------------------------------------------------------------------------
  # Logs — Loki (multitenant, S3).
  # ---------------------------------------------------------------------------
  loki:
    image: grafana/loki:3.6.3
    container_name: perceptor-loki
    labels: *perceptor-monitored
    logging: *logging
    restart: unless-stopped
    mem_limit: 1536m
    command: ["-config.file=/etc/loki/loki.yaml", "-config.expand-env=true"]
    environment: *s3-env
    volumes:
      - ./loki/loki.yaml:/etc/loki/loki.yaml:ro
      - ./loki/overrides.yaml:/etc/loki/overrides.yaml:ro
      - loki-data:/var/loki
    # No healthcheck: the Loki image is distroless (no shell/wget to probe with).
    depends_on:
      init-perms: { condition: service_completed_successfully }
    networks: [obs]

  # ---------------------------------------------------------------------------
  # Traces — Tempo (multitenant, S3).
  # ---------------------------------------------------------------------------
  tempo:
    image: grafana/tempo:2.9.1
    container_name: perceptor-tempo
    labels: *perceptor-monitored
    logging: *logging
    restart: unless-stopped
    mem_limit: 1g
    command: ["-config.file=/etc/tempo/tempo.yaml", "-config.expand-env=true"]
    environment: *s3-env
    volumes:
      - ./tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - ./tempo/overrides.yaml:/etc/tempo/overrides.yaml:ro
      - tempo-data:/var/tempo
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3200/ready"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      init-perms: { condition: service_completed_successfully }
    networks: [obs]

  # ---------------------------------------------------------------------------
  # Grafana (OSS) — one Org per project, datasources provisioned per org.
  # ---------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:12.3.1
    container_name: perceptor-grafana
    labels: *perceptor-monitored
    logging: *logging
    restart: unless-stopped
    mem_limit: 768m
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_USERS_ALLOW_ORG_CREATE: "false"
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      # Direct UI access. With a TLS edge Grafana is served via its vhost on 443,
      # so SERVICE_BIND=127.0.0.1 keeps this on-box only (e.g. an SSH tunnel); in
      # dev it defaults to all interfaces. Caddy reaches Grafana over the network
      # (grafana:3000), independent of this host port.
      - "${SERVICE_BIND:-0.0.0.0}:3001:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 12
    depends_on:
      mimir: { condition: service_started }
      loki:  { condition: service_started }
      tempo: { condition: service_healthy }
    networks: [obs]

  # ---------------------------------------------------------------------------
  # Alloy — CENTRAL self-monitoring agent. Scrapes THIS box's host + container
  # metrics and tails its host + container logs, writing them to the reserved
  # `_infra` tenant (admin org only). This is what finally lets the platform
  # watch its own disk / CPU / RAM. Remote project-VM agents (Phase 1) run the
  # same image but push through Caddy with a per-project token.
  # ---------------------------------------------------------------------------
  alloy:
    image: grafana/alloy:v1.17.1
    container_name: perceptor-alloy
    logging: *logging
    restart: unless-stopped
    # Safety caps. The agent is the one component that can run away (a bad
    # scrape/log loop once pegged this box at 800% CPU). Bounding it means a
    # future runaway can't starve Mimir/Loki and take the stack — and with it
    # self-monitoring — down with it. Steady state is ~220MB / a few %%; raise
    # on very large hosts (cadvisor memory scales with container count).
    mem_limit: 512m
    cpus: 2
    command:
      - run
      - /etc/alloy/config.alloy
      - --storage.path=/var/lib/alloy/data
      - --server.http.listen-addr=0.0.0.0:12345
    environment:
      VM_NAME: central-monitoring
    # Host visibility for the unix (node) + cadvisor exporters and journald.
    privileged: true
    pid: host
    cgroup: host                          # share host cgroup ns → cadvisor sees ALL container cgroups (v2)
    volumes:
      - ./alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro  # host cgroup fs at cadvisor's expected path
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro  # cadvisor resolves container names/images via containerd
      - /var/lib/docker/:/var/lib/docker/:ro
      - /var/log/journal:/var/log/journal:ro
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket:ro  # node_exporter's systemd collector talks to systemd over D-Bus; without this it emits nothing
      - /etc/machine-id:/etc/machine-id:ro
      - alloy-data:/var/lib/alloy/data
    depends_on:
      mimir: { condition: service_started }
      loki:  { condition: service_started }
    networks: [obs]
