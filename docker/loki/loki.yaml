# ============================================================================
# Loki — MULTITENANT, backed by S3 (SeaweedFS by default).
# auth_enabled: true makes Loki REQUIRE X-Scope-OrgID on every read/write.
# Per-tenant retention lives in overrides.yaml (rendered from tenants.yaml).
# ============================================================================

auth_enabled: true                 # tenant = X-Scope-OrgID = project

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /var/loki
  replication_factor: 1
  ring:
    kvstore: { store: inmemory }
  storage:
    s3:
      endpoint: ${S3_ENDPOINT}
      region: ${S3_REGION}
      bucketnames: ${BUCKET_LOKI}
      access_key_id: ${S3_ACCESS_KEY_ID}
      secret_access_key: ${S3_SECRET_ACCESS_KEY}
      insecure: ${S3_INSECURE}            # http on the internal net; false for AWS
      s3forcepathstyle: ${S3_FORCE_PATH_STYLE}

schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: s3
      schema: v13
      index:
        prefix: index_
        period: 24h

compactor:
  working_directory: /var/loki/compactor
  retention_enabled: true          # required for per-tenant retention to apply
  delete_request_store: s3

# Platform-wide default; per-tenant values in overrides.yaml win.
limits_config:
  retention_period: 720h           # 30d

  # Infra telemetry shipped by VM agents arrives via OTLP carrying these
  # low-cardinality attributes. Promote them from structured metadata to real
  # stream LABELS so infra logs are cheaply selectable — {telemetry_source="infra"}
  # — and cleanly separable from a project's app logs, matching how the central
  # _infra agent labels its own streams. App logs don't carry these attributes,
  # so this is a no-op for them; everything else stays as structured metadata.
  otlp_config:
    log_attributes:
      - action: index_label
        attributes:
          - telemetry_source
          - vm
          - job

runtime_config:
  file: /etc/loki/overrides.yaml
