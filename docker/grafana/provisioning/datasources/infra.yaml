# ============================================================================
# _infra datasources — provisioned into the ADMIN org (org 1).
#
# Safe to FILE-provision (unlike per-project datasources) because org 1 always
# exists at boot. These read the reserved `_infra` tenant — the platform's own
# host/container/system telemetry. Only the admin org can see them.
#
# No Tempo datasource: infra emits metrics + logs only, never traces.
# NOTE: static on purpose (one reserved tenant). If `reserved:` in tenants.yaml
# grows, either add entries here or teach render.py to emit this file.
# ============================================================================
apiVersion: 1

datasources:
  - name: "Mimir (infra)"
    uid: mimir-infra
    type: prometheus
    orgId: 1
    access: proxy
    url: http://mimir:9009/prometheus
    isDefault: false
    jsonData:
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: _infra

  - name: "Loki (infra)"
    uid: loki-infra
    type: loki
    orgId: 1
    access: proxy
    url: http://loki:3100
    jsonData:
      httpHeaderName1: X-Scope-OrgID
    secureJsonData:
      httpHeaderValue1: _infra
