# ============================================================================
# Gateway collector.
# Caddy has already authenticated the project and put X-Scope-OrgID in the
# request metadata. headers_setter reads it from context and forwards it
# UNCHANGED to every backend, so each signal lands in the right tenant.
# ============================================================================

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  # Persistent queue: telemetry survives a collector restart / backend blip.
  file_storage/queue:
    directory: /var/lib/otelcol/queue
    timeout: 10s

  # Forward the tenant id that Caddy injected.
  headers_setter:
    headers:
      - action: upsert
        key: X-Scope-OrgID
        from_context: x-scope-orgid

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        include_metadata: true     # required so from_context can read the header
      http:
        endpoint: 0.0.0.0:4318
        include_metadata: true

processors:
  # MUST be first: drops data instead of OOM-killing the collector under load.
  memory_limiter:
    check_interval: 1s
    limit_percentage: 80
    spike_limit_percentage: 25

  # metadata_keys keeps tenants in SEPARATE batches — never merge across tenants.
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: 1s
    metadata_keys: [X-Scope-OrgID]

  # Promote a couple of resource attributes to data-point/span attributes so
  # dashboards can filter on them consistently. Both semconv spellings are
  # handled: `deployment.environment` (pre-1.27 SDKs) first, then
  # `deployment.environment.name` (current) — set() ignores nil, so whichever
  # the SDK sent wins and the other is a no-op.
  transform/env:
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["deployment_environment"], resource.attributes["deployment.environment"])
          - set(attributes["deployment_environment"], resource.attributes["deployment.environment.name"])
    trace_statements:
      - context: span
        statements:
          - set(attributes["deployment_environment"], resource.attributes["deployment.environment"])
          - set(attributes["deployment_environment"], resource.attributes["deployment.environment.name"])

  # ── LOG NOISE CONTROL (edit the two marked lists) ─────────────────────────
  # Applied to the LOGS pipeline only. Two independent levers:
  #   • filter/logs    — BLACKLIST whole log RECORDS (drop them). Add OTTL
  #                      conditions; a record is dropped if ANY is true.
  #   • transform/logs — strip heavy ATTRIBUTES that ride on EVERY line (they
  #                      land in Loki as structured metadata and bloat storage).
  # This is platform-wide (all tenants). Per-app trimming can also be done in the
  # app's OTel SDK, but this is the one central knob.

  # DROP whole records. Empty by default (drops nothing). Uncomment / add rules.
  filter/logs:
    error_mode: ignore
    logs:
      log_record:
        # --- ADD DROP RULES HERE — record dropped if the expression is true ---
        # - 'severity_number < SEVERITY_NUMBER_INFO'                         # drop DEBUG/TRACE
        # - 'IsMatch(body, ".*/actuator/health.*")'                          # health-check spam
        # - 'instrumentation_scope.name == "org.springframework.security.web.FilterChainProxy"'
        # - 'resource.attributes["service.name"] == "chatty-service"'        # silence one service
        - 'false == true'   # harmless no-op placeholder; keep at least one entry

  # STRIP heavy per-line attributes. These SDK/runtime/OS fields are attached to
  # every log and almost never queried — deleting them here shrinks each line.
  # Remove a delete_key line to KEEP that attribute; add lines to strip more.
  transform/logs:
    error_mode: ignore
    log_statements:
      # Resource-level keys stripped with delete_key(resource.attributes, "…").
      # Per-line keys would use delete_key(log.attributes, "…"), e.g. "thread.id".
      - statements:
          - delete_key(resource.attributes, "process.command_args")
          - delete_key(resource.attributes, "process.executable.path")
          - delete_key(resource.attributes, "process.runtime.description")
          - delete_key(resource.attributes, "os.description")
          - delete_key(resource.attributes, "os.type")
          - delete_key(resource.attributes, "host.arch")
          - delete_key(resource.attributes, "telemetry.distro.name")
          - delete_key(resource.attributes, "telemetry.distro.version")
          - delete_key(resource.attributes, "telemetry.sdk.language")
          - delete_key(resource.attributes, "telemetry.sdk.name")
          - delete_key(resource.attributes, "telemetry.sdk.version")
          # --- ADD MORE KEYS TO STRIP HERE (resource.attributes or log.attributes) ---

exporters:
  prometheusremotewrite:
    endpoint: http://mimir:9009/api/v1/push
    tls: { insecure: true }
    auth: { authenticator: headers_setter }
    retry_on_failure: { enabled: true }

  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls: { insecure: true }
    auth: { authenticator: headers_setter }
    sending_queue:
      enabled: true
      storage: file_storage/queue
    retry_on_failure: { enabled: true }

  otlp/tempo:
    endpoint: tempo:4317
    tls: { insecure: true }
    auth: { authenticator: headers_setter }
    sending_queue:
      enabled: true
      storage: file_storage/queue
    retry_on_failure: { enabled: true }

service:
  extensions: [health_check, file_storage/queue, headers_setter]
  telemetry:
    metrics:
      level: detailed       # the collector's own health, scrapeable on :8888
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, transform/env, batch]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, filter/logs, transform/logs, batch]
      exporters: [otlphttp/loki]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, transform/env, batch]
      exporters: [otlp/tempo]
