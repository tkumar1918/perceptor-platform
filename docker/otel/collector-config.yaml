# ============================================================================
# Gateway collector.
# Caddy has already authenticated the project and put X-Scope-OrgID in the
# request metadata. headers_setter reads it from context and forwards it
# UNCHANGED to every backend, so each signal lands in the right tenant.
# ============================================================================

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

  # Persistent queue: telemetry survives a collector restart / backend blip.
  file_storage/queue:
    directory: /var/lib/otelcol/queue
    timeout: 10s

  # Forward the tenant id that Caddy injected.
  headers_setter:
    headers:
      - action: upsert
        key: X-Scope-OrgID
        from_context: x-scope-orgid

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
        include_metadata: true     # required so from_context can read the header
      http:
        endpoint: 0.0.0.0:4318
        include_metadata: true

processors:
  # MUST be first: drops data instead of OOM-killing the collector under load.
  # Explicit MiB, NOT limit_percentage: with no cgroup awareness a percentage
  # reads the HOST's memory, so on an 8GB box "80%" allowed ~6.4GB of growth
  # before limiting anything — an OOM-cascade waiting to happen. 600MiB sits
  # under the service's 768m mem_limit in docker-compose.yml (keep them paired:
  # limiter soft-drops first, cgroup hard-kills as the backstop).
  memory_limiter:
    check_interval: 1s
    limit_mib: 600
    spike_limit_mib: 150

  # metadata_keys keeps tenants in SEPARATE batches — never merge across tenants.
  batch:
    send_batch_size: 1024
    send_batch_max_size: 2048
    timeout: 1s
    metadata_keys: [X-Scope-OrgID]

  # Promote a couple of resource attributes to data-point/span attributes so
  # dashboards can filter on them consistently. Both semconv spellings are
  # handled: `deployment.environment` (pre-1.27 SDKs) first, then
  # `deployment.environment.name` (current) — set() ignores nil, so whichever
  # the SDK sent wins and the other is a no-op.
  transform/env:
    metric_statements:
      - context: datapoint
        statements:
          - set(attributes["deployment_environment"], resource.attributes["deployment.environment"])
          - set(attributes["deployment_environment"], resource.attributes["deployment.environment.name"])
    trace_statements:
      - context: span
        statements:
          - set(attributes["deployment_environment"], resource.attributes["deployment.environment"])
          - set(attributes["deployment_environment"], resource.attributes["deployment.environment.name"])

  # ── NOISE CONTROL ──────────────────────────────────────────────────────────
  # Two independent, platform-wide levers (every tenant, no app config needed):
  #   • filter/logs           — BLACKLIST whole log RECORDS (logs pipeline only).
  #   • transform/trim_resource — strip SDK/runtime/OS resource attributes that
  #     never change for a process's life, from EVERY signal (logs/traces/metrics).
  #     The actual list lives in ../otel/dropped-resource-attributes.yaml — edit
  #     that file, then `make render`. Do not edit the generated block below by
  #     hand.

  # DROP whole records. Empty by default (drops nothing). Uncomment / add rules.
  filter/logs:
    error_mode: ignore
    logs:
      log_record:
        # --- ADD DROP RULES HERE — record dropped if the expression is true ---
        # - 'severity_number < SEVERITY_NUMBER_INFO'                         # drop DEBUG/TRACE
        # - 'IsMatch(body, ".*/actuator/health.*")'                          # health-check spam
        # - 'instrumentation_scope.name == "org.springframework.security.web.FilterChainProxy"'
        # - 'resource.attributes["service.name"] == "chatty-service"'        # silence one service
        - 'false == true'   # harmless no-op placeholder; keep at least one entry

  # STRIP noisy resource attributes from every signal. context: resource means
  # each statement runs ONCE per resource (not once per span/datapoint/log
  # line), and reaches the resource's own attributes directly — no
  # "resource." prefix needed, unlike transform/env above (context: span /
  # datapoint), which reaches up to the resource from a per-item context.
  # The same generated list is reused across all three via a YAML anchor, so
  # there is exactly one place this is generated FROM (the source file) and
  # one place it is generated TO (the anchor below).
  transform/trim_resource:
    error_mode: ignore
    log_statements:
      - context: resource
        statements: &dropped_resource_attrs
          # --- BEGIN GENERATED from docker/otel/dropped-resource-attributes.yaml — edit that file + `make render`, not this block ---
          - delete_key(attributes, "process.pid")
          - delete_key(attributes, "process.owner")
          - delete_key(attributes, "process.command")
          - delete_key(attributes, "process.executable.name")
          - delete_key(attributes, "process.executable.path")
          - delete_key(attributes, "process.command_args")
          - delete_key(attributes, "process.runtime.name")
          - delete_key(attributes, "process.runtime.version")
          - delete_key(attributes, "process.runtime.description")
          - delete_key(attributes, "os.description")
          - delete_key(attributes, "os.type")
          - delete_key(attributes, "host.arch")
          - delete_key(attributes, "telemetry.distro.name")
          - delete_key(attributes, "telemetry.distro.version")
          - delete_key(attributes, "telemetry.sdk.language")
          - delete_key(attributes, "telemetry.sdk.name")
          - delete_key(attributes, "telemetry.sdk.version")
          # --- END GENERATED ---
    trace_statements:
      - context: resource
        statements: *dropped_resource_attrs
    metric_statements:
      - context: resource
        statements: *dropped_resource_attrs

exporters:
  prometheusremotewrite:
    endpoint: http://mimir:9009/api/v1/push
    tls: { insecure: true }
    auth: { authenticator: headers_setter }
    retry_on_failure: { enabled: true }

  otlphttp/loki:
    endpoint: http://loki:3100/otlp
    tls: { insecure: true }
    auth: { authenticator: headers_setter }
    sending_queue:
      enabled: true
      storage: file_storage/queue
    retry_on_failure: { enabled: true }

  otlp/tempo:
    endpoint: tempo:4317
    tls: { insecure: true }
    auth: { authenticator: headers_setter }
    sending_queue:
      enabled: true
      storage: file_storage/queue
    retry_on_failure: { enabled: true }

service:
  extensions: [health_check, file_storage/queue, headers_setter]
  telemetry:
    metrics:
      level: detailed       # the collector's own health, scrapeable on :8888
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [memory_limiter, transform/trim_resource, transform/env, batch]
      exporters: [prometheusremotewrite]
    logs:
      receivers: [otlp]
      processors: [memory_limiter, filter/logs, transform/trim_resource, batch]
      exporters: [otlphttp/loki]
    traces:
      receivers: [otlp]
      processors: [memory_limiter, transform/trim_resource, transform/env, batch]
      exporters: [otlp/tempo]
