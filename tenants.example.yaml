# ============================================================================
# TEMPLATE — copy to tenants.yaml, then edit for THIS deployment:
#
#     cp tenants.example.yaml tenants.yaml
#
# tenants.yaml is gitignored (per-instance). Edit it, then `make render` +
# `make reload`. render owns org_id (tenants.lock.yaml) and ingest tokens
# (tenants.secrets.yaml) — you set neither. `display_name` must be unique.
# ============================================================================

defaults:
  metrics_retention: 30d
  logs_retention: 720h                # Loki uses hours (720h = 30d)
  traces_retention: 720h              # Tempo uses hours (720h = 30d)
  ingestion_rate: 25000               # samples/sec (Mimir)
  max_series: 300000                  # active series per tenant (Mimir)
  traces_rate_limit_bytes: 15000000   # 15 MB/s — Tempo overrides REPLACE these
  traces_burst_bytes: 25000000        # defaults, so both must be set per tenant

tenants:
  # Minimal — inherits every default.
  - id: example-service               # == X-Scope-OrgID. lowercase, no spaces.
    display_name: "Example Service"

  # Overrides some defaults.
  - id: another-service
    display_name: "Another Service"
    metrics_retention: 90d
    logs_retention: 2160h             # 90d
    traces_retention: 2160h           # 90d
    ingestion_rate: 50000
    max_series: 500000

  # `group` — several projects sharing one VM. Adds a read-only infra
  # datasource pair (+ pinned dashboard) to this project's own org, pointed at
  # the shared `_infra-<group>` tenant below. Slug [a-z0-9-]; the matching
  # reserved tenant is required (render fails without it). See README.
  - id: some-dev-project
    display_name: "Some Dev Project"
    group: dev-instance

# ============================================================================
# RESERVED tenants — platform namespaces, no Grafana org (read from admin org).
# id MUST start with "_".
# ============================================================================
reserved:
  # Platform self-monitoring + catch-all for shared hosts. Keep this.
  - id: _infra
    metrics_retention: 90d
    logs_retention: 2160h

  # One per group above. The VM agent ingests with THIS token (not _infra's).
  - id: _infra-dev-instance
    metrics_retention: 90d
    logs_retention: 2160h
